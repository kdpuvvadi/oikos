services:
  pocketbase:
    image: ghcr.io/kdpuvvadi/pocketbase:latest
    container_name: pocketbase
    ports:
      - "${PB_PORT:-8090}:8090"
    volumes:
      - ./pb_data:/usr/src/app/pb_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  oikos:
    image: ghcr.io/kdpuvvadi/oikos:latest
    container_name: oikos
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      PORT: "3000"
      PB_URL: "http://pocketbase:8090"
    ports:
      - "${APP_PORT:-3000}:3000"
