<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oikos</title>
    <script>
      document.documentElement.classList.add('js');
      if (document.cookie.includes('oikos_session=1')) document.documentElement.classList.add('has-session');
    </script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-top">
        <a class="brand" href="/">💸 Oikos</a>
        <button
          type="button"
          class="menu-toggle hidden"
          id="menuToggle"
          aria-expanded="false"
          aria-controls="siteNav"
          aria-label="Open navigation menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="header-panel">
        <nav id="siteNav" aria-label="Main navigation">
          <a href="/" data-nav="/">Home</a>
          <a href="/categories" data-nav="/categories">Categories</a>
          <a href="/stores" data-nav="/stores">Stores</a>
          <a href="/payment-methods" data-nav="/payment-methods">Payment Methods</a>
          <a href="/transactions" data-nav="/transactions">Transactions</a>
          <a href="/dashboard" data-nav="/dashboard">Dashboard</a>
          <a href="/filter" data-nav="/filter">Filter</a>
        </nav>
        <div class="user-menu hidden" id="userMenu">
          <span id="userName"></span>
          <button type="button" id="logoutButton">Logout</button>
        </div>
      </div>
    </header>

    <section id="authPage" class="auth-shell">
      <div class="page-title">
        <h1>Sign in</h1>
      </div>
      <div class="auth-grid">
        <form id="loginForm" class="panel form-stack">
          <h2>Login</h2>
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Login</button>
        </form>

        <form id="registerForm" class="panel form-stack">
          <h2>Create account</h2>
          <label>
            Name
            <input type="text" name="name" autocomplete="name" placeholder="Optional">
          </label>
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button type="submit">Create account</button>
        </form>
      </div>
    </section>

    <main id="appShell" class="hidden">
      <section id="homePage">
        <div class="page-title">
          <p class="eyebrow">This month</p>
          <h1>Expense entry</h1>
        </div>

        <div class="stats-grid">
          <article class="stat-card">
            <span>This month so far</span>
            <strong id="thisMonthTotal">0</strong>
          </article>
          <article class="stat-card">
            <span>Last month total</span>
            <strong id="lastMonthTotal">0</strong>
          </article>
        </div>

        <form id="expenseForm" class="panel form-grid">
          <label>
            Date
            <input type="date" name="date" required>
          </label>
          <label>
            Amount spent
            <input type="number" name="amount" min="0.01" step="0.01" placeholder="0.00" required>
          </label>
          <label>
            Payment mode
            <select name="paymentMethod" id="oikosPaymentMethod"></select>
          </label>
          <label>
            Expense category
            <select name="category" id="oikosCategory" required></select>
          </label>
          <label id="newCategoryWrap" class="hidden">
            New category
            <input type="text" name="categoryName" placeholder="Example: Travel">
          </label>
          <label>
            Subcategory
            <select name="subcategory" id="oikosSubcategory" required></select>
          </label>
          <label id="newSubcategoryWrap" class="hidden">
            New subcategory
            <input type="text" name="subcategoryName" placeholder="Example: Train tickets">
          </label>
          <label>
            Store
            <select name="store" id="oikosStore" required></select>
          </label>
          <label id="newStoreWrap" class="hidden">
            New store
            <input type="text" name="storeName" placeholder="Example: Corner shop">
          </label>
          <button type="submit">Submit expense</button>
        </form>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
