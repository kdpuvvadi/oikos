<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      document.documentElement.classList.add('js');
      if (document.cookie.includes('oikos_session=1')) document.documentElement.classList.add('has-session');
    </script>
    <script type="module" src="/head.js"></script>
  </head>
  <body>
    <oikos-header></oikos-header>
    <oikos-auth-shell id="authPage" class="auth-shell"></oikos-auth-shell>

    <main id="appShell" class="hidden">
      <section id="paymentMethodsPage">
        <div class="page-title">
          <p class="eyebrow">Payment methods</p>
          <h1>Payment methods</h1>
        </div>
        <form id="paymentMethodForm" class="panel inline-form admin-only">
          <input type="text" name="name" placeholder="Payment method name" required>
          <button type="submit">Add payment method</button>
        </form>
        <div id="paymentMethodList" class="list-grid compact"></div>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
