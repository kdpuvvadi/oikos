<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      document.documentElement.classList.add('js');
      if (document.cookie.includes('oikos_session=1')) document.documentElement.classList.add('has-session');
    </script>
    <script type="module" src="/head.js"></script>
  </head>
  <body>
    <oikos-header></oikos-header>
    <oikos-auth-shell id="authPage" class="auth-shell"></oikos-auth-shell>

    <main id="appShell" class="hidden">
      <section id="filterPage">
        <div class="page-title">
          <p class="eyebrow">Filter</p>
          <h1>Pivot filter</h1>
        </div>
        <form id="pivotForm" class="panel inline-form">
          <label>
            Rows
            <select name="row">
              <option value="month">Month</option>
              <option value="category">Category</option>
              <option value="subcategory">Subcategory</option>
              <option value="store">Store</option>
              <option value="paymentMethod">Payment mode</option>
            </select>
          </label>
          <label>
            Columns
            <select name="column">
              <option value="category">Category</option>
              <option value="month">Month</option>
              <option value="subcategory">Subcategory</option>
              <option value="store">Store</option>
              <option value="paymentMethod">Payment mode</option>
            </select>
          </label>
          <button type="submit">Apply</button>
        </form>
        <div class="table-wrap">
          <table id="pivotTable"></table>
        </div>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
