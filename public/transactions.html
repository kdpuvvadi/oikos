<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      document.documentElement.classList.add('js');
      if (document.cookie.includes('oikos_session=1')) document.documentElement.classList.add('has-session');
    </script>
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/head.js"></script>
  </head>
  <body>
    <oikos-header></oikos-header>
    <oikos-auth-shell id="authPage" class="auth-shell"></oikos-auth-shell>

    <main id="appShell" class="hidden">
      <section id="transactionsPage">
        <div class="page-title-bar">
          <div class="page-title">
            <p class="eyebrow">Transactions</p>
            <h1>Transactions</h1>
          </div>
          <div class="transactions-toolbar">
            <button type="button" class="ghost" id="toggleTransactionFilters" aria-expanded="false" aria-controls="transactionFiltersPanel">Filter</button>
          </div>
        </div>
        <div id="transactionFiltersPanel" class="hidden">
          <form id="transactionFilterForm" class="panel inline-form transaction-filter-form">
            <label>
              From
              <input type="date" name="fromDate">
            </label>
            <label>
              To
              <input type="date" name="toDate">
            </label>
            <label>
              Category
              <select name="category" id="transactionFilterCategory">
                <option value="">All categories</option>
              </select>
            </label>
            <label>
              Subcategory
              <select name="subcategory" id="transactionFilterSubcategory">
                <option value="">All subcategories</option>
              </select>
            </label>
            <label class="admin-only">
              User
              <select name="user" id="transactionFilterUser">
                <option value="">All users</option>
              </select>
            </label>
            <button type="submit">Apply filters</button>
            <button type="button" class="ghost" id="clearTransactionFilters">Clear</button>
          </form>
        </div>
        <div class="table-wrap transaction-table-wrap">
          <table class="transactions-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Title</th>
                <th>Amount</th>
                <th>Payment mode</th>
                <th>Category</th>
                <th>Subcategory</th>
                <th>Store</th>
                <th class="admin-only">User</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="transactionsTable"></tbody>
          </table>
        </div>
        <div id="transactionsPagination" class="panel transactions-pagination hidden"></div>
      </section>
    </main>

    <dialog id="editTransactionDialog">
      <form id="editTransactionForm" class="form-stack">
        <div class="dialog-title">
          <h2>Edit transaction</h2>
          <button type="button" class="ghost" id="closeEditDialog">Close</button>
        </div>
        <input type="hidden" name="id">
        <label>Date<input type="date" name="date" required></label>
        <label>Title<input type="text" name="title" placeholder="Example: Fuel refill"></label>
        <label>Amount spent<input type="number" name="amount" min="0.01" step="0.01" required></label>
        <label>Payment mode<select name="paymentMethod" id="editPaymentMethod"></select></label>
        <label>Expense category<select name="category" id="editCategory" required></select></label>
        <label>Subcategory<select name="subcategory" id="editSubcategory" required></select></label>
        <label>Store<select name="store" id="editStore" required></select></label>
        <label id="editStoreTextWrap" class="hidden">Store name<input type="text" name="storeText" id="editStoreText" placeholder="Example: Corner shop"></label>
        <button type="submit">Save changes</button>
      </form>
    </dialog>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
