<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      document.documentElement.classList.add('js');
      if (document.cookie.includes('oikos_session=1')) document.documentElement.classList.add('has-session');
    </script>
    <script type="module" src="/head.js"></script>
  </head>
  <body>
    <oikos-header></oikos-header>
    <oikos-auth-shell id="authPage" class="auth-shell"></oikos-auth-shell>

    <main id="appShell" class="hidden">
      <section id="dashboardPage">
        <div class="page-title">
          <p class="eyebrow">Dashboard</p>
          <h1>Dashboard</h1>
        </div>
        <div class="dashboard-grid">
          <section class="panel">
            <h2>By month</h2>
            <div id="monthChart" class="bars"></div>
          </section>
          <section class="panel">
            <h2>By category</h2>
            <div id="categoryChart" class="bars"></div>
          </section>
          <section class="panel">
            <h2>By store</h2>
            <div id="storeChart" class="bars"></div>
          </section>
        </div>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
