<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oikos Categories</title>
    <script>
      document.documentElement.classList.add('js');
      if (document.cookie.includes('oikos_session=1')) document.documentElement.classList.add('has-session');
    </script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-top">
        <a class="brand" href="/">💸 Oikos</a>
        <button type="button" class="menu-toggle hidden" id="menuToggle" aria-expanded="false" aria-controls="siteNav" aria-label="Open navigation menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="header-panel">
        <nav id="siteNav" aria-label="Main navigation">
          <a href="/" data-nav="/">Home</a>
          <a href="/categories" data-nav="/categories">Categories</a>
          <a href="/stores" data-nav="/stores">Stores</a>
          <a href="/payment-methods" data-nav="/payment-methods">Payment Methods</a>
          <a class="admin-only" href="/users" data-nav="/users">Users</a>
          <a href="/transactions" data-nav="/transactions">Transactions</a>
          <a href="/dashboard" data-nav="/dashboard">Dashboard</a>
          <a href="/filter" data-nav="/filter">Filter</a>
        </nav>
        <div class="user-menu hidden" id="userMenu">
          <span id="userName"></span>
          <button type="button" id="logoutButton">Logout</button>
        </div>
      </div>
    </header>

    <section id="authPage" class="auth-shell">
      <div class="page-title"><h1>Sign in</h1></div>
      <div class="auth-grid">
        <form id="loginForm" class="panel form-stack">
          <h2>Login</h2>
          <label>Email<input type="email" name="email" autocomplete="email" required></label>
          <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
          <button type="submit">Login</button>
        </form>
        <form id="registerForm" class="panel form-stack">
          <h2>Create account</h2>
          <label>Name<input type="text" name="name" autocomplete="name" placeholder="Optional"></label>
          <label>Email<input type="email" name="email" autocomplete="email" required></label>
          <label>Password<input type="password" name="password" autocomplete="new-password" minlength="8" required></label>
          <button type="submit">Create account</button>
        </form>
      </div>
    </section>

    <main id="appShell" class="hidden">
      <section id="categoriesPage">
        <div class="page-title">
          <p class="eyebrow">Categories</p>
          <h1>Categories</h1>
        </div>
        <form id="categoryForm" class="panel inline-form admin-only">
          <input type="text" name="name" placeholder="Category name" required>
          <input type="text" name="subcategoryName" placeholder="Optional subcategory">
          <button type="submit">Add category</button>
        </form>
        <div id="categoryList" class="list-grid"></div>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
