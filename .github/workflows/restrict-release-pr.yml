name: Restrict Release PRs to Owner

on:
  pull_request:
    types: [opened]
    branches:
      - release

jobs:
  check-owner:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check if PR author is repo owner
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const author = pr.user.login;
            
            console.log(`PR Author: ${author}`);
            console.log(`Repo Owner: ${owner}`);
            
            if (author !== owner) {
              // Close the PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                state: 'closed'
              });
              
              // Leave a comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ Only the repository owner can open PRs to the `release` branch.\n\n💡 Please contact the repository owner to create a release PR.\n\n**Workflow:**\n- Feature branches → PR to `develop`\n- `develop` → PR to `release` (owner only)\n- `release` → `main` (automatically on merge)'
              });
              
              core.setFailed(`PR from ${author} is not allowed on release branch. Only ${owner} can open release PRs.`);
            } else {
              console.log('✓ PR author is the repo owner. PR is allowed.');
            }
