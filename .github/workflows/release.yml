name: Create Release on Merge to Release Branch

on:
  push:
    branches:
      - release

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm check
        run: npm run check
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from latest PR or commit
        id: version
        run: |
          # Get the latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          # Extract version from PR title format (release-v1.2.3)
          if [[ $COMMIT_MSG =~ release-v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="v${BASH_REMATCH[1]}"
          elif [[ $COMMIT_MSG =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="v${BASH_REMATCH[1]}"
          else
            echo "❌ Could not extract version from commit message"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✓ Extracted version: $VERSION"

      - name: Check if tag already exists
        id: check-tag
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Generate changelog
        if: steps.check-tag.outputs.exists == 'false'
        id: changelog
        run: |
          # Find the second most recent tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          
          echo "CHANGELOG_CONTENT<<EOF" >> $GITHUB_ENV
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %h: %s (%an)" -n 50 >> $GITHUB_ENV
          else
            git log $PREV_TAG..HEAD --pretty=format:"- %h: %s (%an)" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: steps.check-tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes in this release
            ${{ env.CHANGELOG_CONTENT }}
            
            ---
            *Automated release from the release branch.*
          draft: false
          prerelease: false

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update main branch with merge commit
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          TAG="${{ steps.version.outputs.version }}"
          git merge --no-ff origin/release -m "Merge release ${TAG} into main"
          git push origin main
